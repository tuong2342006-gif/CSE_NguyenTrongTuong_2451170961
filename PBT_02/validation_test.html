<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Validation Test</title>
</head>

<body>
    <h2>Test Validation</h2>
    <form>
        
        <p>Trường hợp 1</p>
        <input type="text" required placeholder="Bắt buộc nhập">

        <p>Trường hợp 2</p>
        <input type="email" value="abc">

        <p>Trường hợp 3</p>
        <input type="number" min="1" max="10" value="15">

        <p>Trường hợp 4</p>
        <input type="text" pattern="[0-9]{10}" value="abc123">

        <p>Trường hợp 5</p>
        <input type="password" minlegth="8" value="123">

        <br><br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
