<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-08">
    <title>Đăng ký tài khoản</title>
</head>
<body>
    <h1>Form Đăng ký</h1>
    <form action="#" method="POST">

        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <label for="name">Họ tên</label><br>
            <input type ="text" id="name" name="name"
                    placeholder="Nhập họ tên"
                    required minlength="2" maxlegth="50"><br><br>

            <label for="email">Email</label><br>
            <input type="email" id="email" name="email"
                    placeholer="Nhập 10 chữ số"
                    pattern="[0-9]{10}"><br><br>
            <label for="dob">Ngày sinh:</label><br>
            <input type="date" id="dob" name="dob"
                    max="2026-04-23"
                    placeholder="Chọn ngày sinh"><br><br>
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>

            <label for="username">Username:</label><br>
            <input type="text" id="username" name="username"
                    placeholder="3-20 ký tự"
                    pattern="'[A-Za-z0-9_]{3,20}"><br><br>
            
            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password"
                    placeholder="ít nhất 8 ký tự"
                    minlegth="8"
                    pattern="(?=.*[A-Z])(?=.*[0-9].{8,})"><br><br>

            <label for="confirm">Xác nhận password</label><br>
            <input type="password" id="confirm" name="confirm"
                    placeholder="Nhập lại mật khẩu"
                    minlegth="8"><br><br>
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>
            
            <label for="city">Thành phố:</label><br>
            <select id="city" name="city">
                <option>Hà Nội</option>
                <option>TP.HCM</option>
                <option>Đà Nẵng</option>
                <option>Hải Phòng</option>
                <option>Huế</option>
            </select><br><br>

            <label for="district">Quận/Huyện</label><br>
            <select id="district" name="district">
                <option>Quận 1</option>
                <option>Quận 2</option>
                <option>Quận 3</option>
            </select><br><br>

            <label for="address">Địa chỉ chi tiết:</label><br>
            <textarea id="address" name="address"
                    placeholer="Nhập địa chỉ"
                    rows="3"></textarea><br><br>
            
            <p>Giới tính:</p>
            <input type="radio" id="male" name="gender" value="male">
            <label fot="male">Nam</label>

            <input type="radio" id="female" name="gender" value="other">
            <label for="female">Nữ</label>

            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Khác</label><br><br>

            <input type="checkbox" id="agree" required>
            <label for="agree">Tôi đồng ý điều khoản</label><br><br>
        </fieldset>

        <button type="submit">Đăng ký</button>
        <button type="reset">Xóa</button>
    </form>
</body>
</html>
